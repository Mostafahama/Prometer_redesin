<section #sectionRef class="relative py-24 bg-transparent overflow-hidden">
  
  <!-- Subtle backlights -->
  <div class="absolute left-1/4 top-1/4 w-[50vw] h-[50vw] rounded-full bg-prometer-neon/5 blur-[120px] pointer-events-none -z-10"></div>

  <div class="container mx-auto px-6 relative z-10 w-full">
    
    <!-- Title -->
    <div class="text-center mb-12 max-w-2xl mx-auto">
      <span class="text-prometer-neon text-xs font-bold uppercase tracking-[2.5px] block mb-3">
        {{ currentText.badge }}
      </span>
      <h2 class="text-3xl md:text-4xl font-extrabold text-prometer-mint tracking-tight">
        {{ currentText.title }}
      </h2>
    </div>

    <!-- Tabs Container -->
    <div class="flex overflow-x-auto justify-start md:justify-center gap-2 lg:gap-3 mb-6 lg:mb-12 max-w-3xl mx-auto pb-4 snap-x snap-mandatory" style="scrollbar-width: none;">
      @for (v of views; track v.id) {
        <button (click)="changeTab($index)"
                class="flex-shrink-0 snap-center flex items-center gap-1.5 lg:gap-3 px-3 lg:px-6 py-2 lg:py-4 rounded-lg lg:rounded-xl text-[9px] lg:text-sm font-semibold transition-all duration-300 select-none whitespace-nowrap
                       {{ activeIndex === $index 
                          ? 'bg-prometer-neon text-white shadow-neon' 
                          : 'bg-prometer-dark border border-prometer-mint/10 text-prometer-mint/80 hover:text-prometer-mint hover:border-prometer-mint/30' 
                       }}">
          <span class="font-mono text-[8px] lg:text-xs opacity-60">0{{ $index + 1 }}</span>
          {{ v.label }}
        </button>
      }
    </div>

    <!-- Active view content -->
    <div class="grid grid-cols-2 gap-4 lg:gap-12 items-center max-w-6xl mx-auto text-left rtl:text-right">
      
      <!-- Features list (Left Column) -->
      <div class="transition-opacity duration-300" [class.opacity-40]="transitioning">
        <h3 class="text-sm lg:text-xl font-black text-prometer-mint mb-2 lg:mb-4 leading-tight">
          {{ currentText.featuresHeader }}
        </h3>
        <p class="text-[8px] lg:text-sm text-prometer-mint/70 mb-4 lg:mb-8 leading-relaxed font-light">
          {{ views[activeIndex].desc }}
        </p>

        <div class="space-y-2 lg:space-y-4">
          @for (f of views[activeIndex].features; track f.text) {
            <div class="flex items-start lg:items-center gap-1.5 lg:gap-4 p-2 lg:p-4 rounded-lg lg:rounded-xl border border-prometer-mint/5 bg-prometer-dark/30 backdrop-blur-xl">
              <!-- Number Indicator -->
              <span class="text-[7px] lg:text-xs font-mono font-bold text-prometer-neon flex-shrink-0 w-3 lg:w-5 pt-0.5 lg:pt-0">0{{ $index + 1 }}.</span>
              <span class="text-[8px] lg:text-sm text-prometer-mint/80 font-semibold leading-snug">{{ f.text }}</span>
            </div>
          }
        </div>
      </div>

      <!-- 3D Parallax Screenshot (Right Column) -->
      <div #imageContainer class="relative flex justify-center w-full" style="perspective: 1200px;">
        <div class="relative w-full max-w-[500px] aspect-[4/3] rounded-xl lg:rounded-2xl overflow-hidden shadow-neon border border-prometer-mint/10 bg-prometer-dark/50 transition-transform duration-200 ease-out"
             [style.transform]="'rotateY(' + (mouseX * 6) + 'deg) rotateX(' + (-mouseY * 5) + 'deg)'"
             style="transform-style: preserve-3d;">
          
          <!-- Mockup Browser Header -->
          <div class="flex items-center gap-1.5 lg:gap-2 px-2 lg:px-4 py-1.5 lg:py-3 border-b border-prometer-mint/10 bg-prometer-dark/80 justify-start">
            <div class="flex gap-1.5 flex-row">
              <span class="w-2.5 h-2.5 rounded-full bg-red-500/80"></span>
              <span class="w-2.5 h-2.5 rounded-full bg-amber-500/80"></span>
              <span class="w-2.5 h-2.5 rounded-full bg-emerald-500/80"></span>
            </div>
            <div class="flex-1 mx-2 lg:mx-4 flex justify-center">
              <div class="px-2 lg:px-4 py-0.5 rounded-md text-[6px] lg:text-[10px] text-prometer-mint/40 bg-prometer-mint/5 border border-prometer-mint/10 font-mono tracking-wide truncate max-w-[80%] lg:max-w-[260px] select-all">
                prometer-sa.com/app/{{ views[activeIndex].id }}
              </div>
            </div>
          </div>

          <!-- Screenshot (Rendering Actual Image Assets) -->
          <div class="w-full h-[calc(100%-43px)] flex items-center justify-center p-6 bg-gradient-to-b from-prometer-dark to-prometer-deep relative overflow-hidden"
               [class.py-8]="views[activeIndex].id === 'employee'">
            
            <img src="{{ views[activeIndex].image }}" 
                 alt="{{ views[activeIndex].label }}"
                 [class]="views[activeIndex].id === 'employee' 
                          ? 'w-[45%] max-w-[200px] rounded-[1.25rem] shadow-2xl h-auto block transition-all duration-300' 
                          : 'w-full h-auto block transition-all duration-300'"
                 [class.scale-[0.95]]="transitioning"
                 [class.opacity-0]="transitioning"
                 [class.opacity-100]="!transitioning"
                 [style.boxShadow]="views[activeIndex].id === 'employee' ? '0 20px 60px rgba(165,55,251,0.3), 0 0 0 3px rgba(165,55,251,0.15)' : ''"
                 loading="eager">

          </div>

        </div>
      </div>

    </div>

  </div>
</section>
