<header class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 border-b border-prometer-mint/5 bg-prometer-dark/60 backdrop-blur-xl">
  <div class="container mx-auto px-6 h-20 flex items-center justify-between">
    
    <!-- Logo & Brand name -->
    <a href="#hero" (click)="scrollToSection('#hero'); $event.preventDefault();" class="flex items-center gap-2 select-none">
      <img src="images/prometer-logo.png" alt="ProMeter Logo" class="h-6 md:h-8 w-auto object-contain" style="filter: invert(1) brightness(2);">
    </a>

    <!-- Desktop Navigation Links -->
    <nav class="hidden md:flex items-center gap-8">
      @for (link of navLinks; track link.anchor) {
        <a [href]="link.anchor" (click)="scrollToSection(link.anchor); $event.preventDefault();"
           class="text-xs font-bold text-prometer-mint/80 hover:text-prometer-neon transition-colors duration-300">
          {{ link.label }}
        </a>
      }
    </nav>

    <!-- Right Call To Action & Language Switcher -->
    <div class="hidden md:flex items-center gap-4">
      <button (click)="toggleLanguage()" 
              class="px-3 py-2 rounded-xl text-xs font-bold font-mono border border-prometer-mint/15 bg-prometer-dark/40 text-prometer-mint/85 hover:text-prometer-neon hover:border-prometer-neon/30 transition-all duration-300">
        {{ currentLang === 'en' ? 'العربية' : 'English' }}
      </button>
      <a href="#contact" (click)="scrollToSection('#contact'); $event.preventDefault();"
         class="px-6 py-2.5 rounded-xl text-xs font-bold text-prometer-dark bg-prometer-mint shadow-neon hover:shadow-neon-lg hover:bg-prometer-neon hover:text-white transition-all duration-300">
        {{ buttonText }}
      </a>
    </div>

    <!-- Mobile Language Toggle Button -->
    <button (click)="toggleLanguage()" 
            class="md:hidden px-4 py-2 rounded-xl text-xs font-bold font-mono border border-prometer-mint/15 bg-prometer-dark/40 text-prometer-mint/85 hover:text-prometer-neon hover:border-prometer-neon/30 transition-all duration-300">
      {{ currentLang === 'en' ? 'العربية' : 'EN' }}
    </button>

  </div>

  <!-- Mobile Drawer Menu -->
  @if (mobileMenuOpen) {
    <div class="md:hidden border-t border-prometer-mint/5 bg-prometer-dark/95 backdrop-blur-xl">
      <div class="px-6 py-6 space-y-4">
        @for (link of navLinks; track link.anchor) {
          <a [href]="link.anchor" (click)="scrollToSection(link.anchor); $event.preventDefault();"
             class="block text-sm font-semibold text-prometer-mint/80 hover:text-prometer-neon py-2 transition-colors duration-300">
            {{ link.label }}
          </a>
        }
        <div class="pt-4 border-t border-prometer-mint/5 flex flex-col gap-3">
          <button (click)="toggleLanguage()" 
                  class="w-full text-center py-2.5 rounded-xl text-xs font-bold border border-prometer-mint/10 bg-prometer-dark/40 text-prometer-mint">
            {{ currentLang === 'en' ? 'العربية' : 'English' }}
          </button>
          <a href="#contact" (click)="scrollToSection('#contact'); $event.preventDefault();"
             class="block text-center py-3.5 rounded-xl text-xs font-bold text-prometer-dark bg-prometer-mint shadow-neon">
            {{ buttonText }}
          </a>
        </div>
      </div>
    </div>
  }
</header>
