<section #industriesSection class="relative py-24 bg-transparent overflow-hidden">
  
  <!-- Subtle lighting background -->
  <div class="absolute left-1/4 bottom-1/4 w-[40vw] h-[40vw] rounded-full bg-prometer-neon/5 blur-[120px] pointer-events-none -z-10"></div>

  <div class="container mx-auto px-6 mb-16 relative z-10">
    <div class="text-center max-w-3xl mx-auto">
      <span class="text-prometer-neon text-xs font-bold uppercase tracking-[2.5px] block mb-3">{{ currentText.badge }}</span>
      <h2 class="text-3xl md:text-5xl font-extrabold text-prometer-mint tracking-tight mb-6 leading-tight">
        {{ currentText.title }}
      </h2>
      <p class="text-base md:text-lg text-prometer-mint/70 font-light leading-relaxed">
        {{ currentText.desc }}
      </p>
    </div>
  </div>

  <!-- Industries Grid/Carousel -->
  <div #gridRef class="container mx-auto px-6 relative z-10 flex overflow-x-auto lg:grid lg:grid-cols-5 gap-4 lg:gap-6 max-w-6xl mx-auto pt-4 pb-6 snap-x snap-mandatory" style="scrollbar-width: none;">
    @for (ind of industries; track $index) {
      <div class="industry-card flex-shrink-0 w-[280px] lg:w-auto snap-center flex flex-col justify-between p-6 rounded-2xl cursor-pointer select-none transition-all duration-300 relative group text-left rtl:text-right
                  {{ ind.isCosmetics 
                      ? 'border border-prometer-neon/50 bg-prometer-neon/[0.04] shadow-neon hover:shadow-neon-lg' 
                      : 'border border-prometer-mint/10 bg-prometer-dark/30 backdrop-blur-xl shadow-glass hover:border-prometer-neon/40' 
                  }}">
        
        <div>
          <!-- Highlight tag for primary sectors -->
          @if (ind.isCosmetics) {
            <div class="absolute -top-3 -right-3 bg-prometer-neon text-prometer-base text-[10px] font-bold px-3 py-1 rounded-full shadow-[0_0_10px_rgba(165,55,251,0.5)] z-20">
              {{ currentText.coreSector }}
            </div>
          }

          <!-- Icon Wrap -->
          <div class="w-11 h-11 rounded-xl flex items-center justify-center mb-5 transition-all duration-300"
                [style.backgroundColor]="ind.color + '15'"
                [style.border]="'1px solid ' + ind.color + '30'">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"
                  class="w-5 h-5 transition-transform duration-300 group-hover:scale-110"
                  [style.color]="ind.color">
              <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="ind.svgPath" />
            </svg>
          </div>

          <!-- Title -->
          <h3 class="text-base font-black text-prometer-mint mb-2">
            {{ ind.title }}
          </h3>

          <!-- Description -->
          <p class="text-xs text-prometer-mint/70 leading-relaxed font-light">
            {{ ind.desc }}
          </p>
        </div>



      </div>
    }
  </div>

</section>
