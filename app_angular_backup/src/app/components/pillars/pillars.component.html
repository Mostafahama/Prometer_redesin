<section class="relative py-24 bg-transparent overflow-hidden">
  <!-- Subtle decorative glowing lights -->
  <div class="absolute -right-1/4 top-1/2 -translate-y-1/2 w-[50vw] h-[50vw] rounded-full bg-prometer-neon/5 blur-[100px] pointer-events-none -z-10"></div>
  
  <div class="container mx-auto px-6 relative z-10 w-full">
    
    <!-- Section Title -->
    <div class="text-center mb-16 max-w-2xl mx-auto">
      <span class="text-prometer-neon text-xs font-bold uppercase tracking-[2.5px] block mb-3">
        {{ currentText.badge }}
      </span>
      <h2 class="text-3xl md:text-4xl font-extrabold text-prometer-mint tracking-tight">
        {{ currentText.title }}
      </h2>
    </div>

    <!-- Cards Grid -->
    <div #pillarsContainer class="flex flex-col md:grid md:grid-cols-3 gap-4 md:gap-8 items-center md:items-stretch max-w-6xl mx-auto pb-4">
      @for (card of cards; track $index) {
        <div class="pillar-card w-full max-w-[320px] md:max-w-none md:w-auto flex flex-col p-8 rounded-2xl transition-all duration-300 {{ card.bgClass }} cursor-pointer select-none text-left rtl:text-right">
          <div>
            <!-- Accent Label -->
            <span class="inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider mb-6 bg-black/10 border border-white/5">
              {{ card.accentText }}
            </span>
            
            <!-- Card H3 Main Text -->
            <h3 class="text-2xl font-black mb-4 leading-snug">
              {{ card.text }}
            </h3>
            
            <!-- Description -->
            <p class="text-sm leading-relaxed opacity-85 font-light">
              {{ card.description }}
            </p>
          </div>

        </div>
      }
    </div>

  </div>
</section>
