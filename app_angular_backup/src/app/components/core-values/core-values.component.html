<section #valuesSection class="relative py-28 bg-transparent overflow-hidden">
  <!-- Glowing neon grid lines background -->
  <div class="absolute inset-0 bg-[linear-gradient(rgba(165,55,251,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(165,55,251,0.03)_1px,transparent_1px)] bg-[size:40px_40px] pointer-events-none -z-10"></div>
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[60vw] h-[60vw] rounded-full bg-prometer-neon/5 blur-[120px] pointer-events-none -z-10"></div>

  <div class="container mx-auto px-6 relative z-10 w-full text-center">
    
    <!-- Section Title & Logo -->
    <div class="text-center mb-10 max-w-2xl mx-auto">
      <span class="text-prometer-neon text-xs font-bold uppercase tracking-[2.5px] block mb-3">
        {{ currentText.badge }}
      </span>
      <h2 class="text-3xl md:text-4xl font-extrabold text-prometer-mint tracking-tight mb-4">
        {{ currentText.title }}
      </h2>
      <p class="text-sm text-prometer-mint/60 font-light leading-relaxed max-w-lg mx-auto">
        {{ currentText.subtitle }}
      </p>
    </div>

    <!-- 5-Petal Diagram Layout -->
    <div class="flex flex-col items-center justify-center max-w-4xl mx-auto mt-12 gap-8">
      
      <!-- Interactive Radial SVG Diagram -->
      <div class="relative w-full max-w-3xl flex items-center justify-center min-h-[500px]">
        <!-- Interactive Pentagon/Flower Base -->
        <div class="relative w-[500px] h-[500px] mx-auto group">
               
            <!-- Central SVG Geometry -->
            <svg viewBox="0 0 400 400" class="w-full h-full drop-shadow-[0_0_15px_rgba(165,55,251,0.2)]">
            <defs>
              <!-- Gradual Center Glow -->
              <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="rgba(165,55,251,0.25)" />
                <stop offset="100%" stop-color="rgba(17,3,33,0)" />
              </radialGradient>
            </defs>

            <!-- Ambient glow under the logo -->
            <circle cx="200" cy="200" r="140" fill="url(#center-glow)" />

            <!-- ── EXACT GEOMETRIC PETAL PATHS ── -->
            <!-- Each petal is rendered independently, allowing individual hover fills and the exact 5-cusp pentagon negative space -->
            @for (petal of petals; track $index) {
              <g class="petal-group pointer-events-auto cursor-pointer transition-all duration-300" 
                 (mouseenter)="onPetalHover($index)"
                 (mouseleave)="onPetalLeave()"
                 (click)="selectPetal($index)">
                
                <!-- Main Petal Outline & Fill -->
                <path class="petal-path transition-all duration-300" 
                      [attr.d]="petal.path" 
                      [attr.fill]="activeIndex === $index ? 'rgba(165,55,251,0.15)' : 'rgba(17,3,33,0.3)'" 
                      [attr.stroke]="activeIndex === $index ? '#A537FB' : 'rgba(202,227,222,0.8)'" 
                      stroke-width="2.5" 
                      stroke-linecap="round" 
                      stroke-linejoin="round" />
                

              </g>
            }
          </svg>

          <!-- ── INTERACTIVE NUMBERS (Orbit with the logo, but counter-rotate to stay upright) ── -->
          <div class="absolute inset-0 pointer-events-none z-10">
            @for (val of currentTextValues; track $index) {
              <div class="absolute w-11 h-11"
                   [style.left]="getNumberPosition($index).x"
                   [style.top]="getNumberPosition($index).y"
                   [style.transform]="'translate(-50%, -50%)'">
                
                <!-- Number Container -->
                <div class="w-full h-full pointer-events-none">
                  <button
                    (mouseenter)="onPetalHover($index)"
                    (mouseleave)="onPetalLeave()"
                    (click)="selectPetal($index)"
                    class="w-full h-full transition-all duration-300 font-mono text-xl font-black pointer-events-auto flex items-center justify-center"
                    [class]="activeIndex === $index 
                      ? 'text-white scale-125 drop-shadow-[0_0_8px_rgba(255,255,255,0.5)]' 
                      : 'text-prometer-mint/40 hover:text-prometer-mint/80 hover:scale-110'"
                  >
                    0{{ $index + 1 }}
                  </button>
                </div>
              </div>
            }
          </div>

        </div>

      </div>

      <!-- Shared Text Panel (crossfade text card) -->
      <div class="w-full max-w-xl glass-panel p-8 rounded-2xl border border-prometer-mint/10 bg-prometer-dark/30 backdrop-blur-xl min-h-[160px] flex flex-col justify-center text-center transition-all duration-300 z-10">
        <div class="flex flex-col items-center justify-center transition-opacity duration-200"
             [class.opacity-100]="textOpacity === 1"
             [class.opacity-0]="textOpacity === 0">
          <span class="text-prometer-neon text-[10px] font-mono tracking-wider uppercase mb-2 block font-bold">
            {{ isAr ? 'المبدأ الأساسي' : 'Core Principle' }} 0{{ activeIndex + 1 }}
          </span>
          <h3 class="text-lg font-black text-prometer-mint mb-2 leading-tight">
            {{ currentTextValues[activeIndex].title }}
          </h3>
          <p class="text-xs text-prometer-mint/70 leading-relaxed font-light max-w-md">
            {{ currentTextValues[activeIndex].desc }}
          </p>
        </div>
      </div>

    </div>

  </div>
</section>
