<section #valuesSection class="relative py-28 bg-transparent overflow-hidden">
  <!-- Glowing neon grid lines background -->
  <div class="absolute inset-0 bg-[linear-gradient(rgba(165,55,251,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(165,55,251,0.03)_1px,transparent_1px)] bg-[size:40px_40px] pointer-events-none -z-10"></div>
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[60vw] h-[60vw] rounded-full bg-prometer-neon/5 blur-[120px] pointer-events-none -z-10"></div>

  <div class="container mx-auto px-6 relative z-10 w-full text-center">
    
    <!-- Section Title & Logo -->
    <div class="text-center mb-10 max-w-2xl mx-auto">
      <span class="text-prometer-neon text-xs font-bold uppercase tracking-[2.5px] block mb-3">
        {{ currentText.badge }}
      </span>
      <h2 class="text-3xl md:text-4xl font-extrabold text-prometer-mint tracking-tight mb-4">
        {{ currentText.title }}
      </h2>
      <p class="text-sm text-prometer-mint/60 font-light leading-relaxed max-w-lg mx-auto">
        {{ currentText.subtitle }}
      </p>
    </div>

    <!-- 5-Petal Diagram Layout -->
    <div class="flex flex-col items-center justify-center max-w-4xl mx-auto mt-12 gap-8">
      
      <!-- Interactive Radial SVG Diagram -->
      <div class="relative w-full max-w-3xl flex items-center justify-center min-h-[500px]">
        <!-- Interactive Pentagon/Flower Base -->
        <div class="relative w-[500px] h-[500px] mx-auto group">
               
          <svg width="420" height="420" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full overflow-visible">
            <defs>
              <!-- Single Petal Definition for the rotating logo -->
              <g id="petal-shape">
                <path d="M 200 68 C 248 68 280 135 200 200 C 120 135 152 68 200 68 Z" 
                      stroke-width="1.8" stroke-linejoin="round" />
              </g>

              <!-- Gradual Center Glow -->
              <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="rgba(165,55,251,0.25)" />
                <stop offset="100%" stop-color="rgba(17,3,33,0)" />
              </radialGradient>
            </defs>

            <!-- Ambient glow under the logo -->
            <circle cx="200" cy="200" r="140" fill="url(#center-glow)" pointer-events-none />

            <!-- Dashed guide track for the numbers -->
            <circle cx="200" cy="200" r="100" stroke="rgba(202,227,222,0.12)" stroke-width="1.2" stroke-dasharray="6 4" />

            <!-- ── ROTATING LOGO MARK LAYER 1 (Purple - Clockwise) ── -->
            <g class="animate-[spin_40s_linear_infinite]" style="transform-origin: 200px 200px;">
              <g stroke="rgba(165, 55, 251, 0.4)" fill="none">
                <use href="#petal-shape" transform="rotate(0, 200, 200)" />
                <use href="#petal-shape" transform="rotate(72, 200, 200)" />
                <use href="#petal-shape" transform="rotate(144, 200, 200)" />
                <use href="#petal-shape" transform="rotate(216, 200, 200)" />
                <use href="#petal-shape" transform="rotate(288, 200, 200)" />
              </g>
            </g>

            <!-- ── ROTATING LOGO MARK LAYER 2 (Mint/White - Counter-Clockwise, Offset) ── -->
            <g class="animate-[spin_28s_linear_infinite_reverse]" style="transform-origin: 200px 200px;">
              <g stroke="rgba(202, 227, 222, 0.3)" fill="none">
                <use href="#petal-shape" transform="rotate(18, 200, 200)" />
                <use href="#petal-shape" transform="rotate(90, 200, 200)" />
                <use href="#petal-shape" transform="rotate(162, 200, 200)" />
                <use href="#petal-shape" transform="rotate(234, 200, 200)" />
                <use href="#petal-shape" transform="rotate(306, 200, 200)" />
              </g>
            </g>

            <!-- ── STATIC INTERACTIVE 5-PETAL PROMETER LOGO CORE ── -->
            <!-- Each of the 5 petals points directly to its corresponding number, with the active one highlighted -->
            <g fill="none">
              <!-- Petal 1 (points to 01 at top / 0 deg) -->
              <path d="M 200 68 C 248 68 280 135 200 200 C 120 135 152 68 200 68 Z" 
                    [attr.stroke]="activeIndex === 0 ? '#CAE3DE' : 'rgba(165, 55, 251, 0.25)'" 
                    [attr.stroke-width]="activeIndex === 0 ? 2.5 : 1.5"
                    [attr.fill]="activeIndex === 0 ? 'rgba(165, 55, 251, 0.1)' : 'transparent'"
                    class="transition-all duration-300 cursor-pointer"
                    (click)="selectPetal(0)" />

              <!-- Petal 2 (points to 02 at right-top / 72 deg) -->
              <path d="M 200 68 C 248 68 280 135 200 200 C 120 135 152 68 200 68 Z" 
                    transform="rotate(72, 200, 200)"
                    [attr.stroke]="activeIndex === 1 ? '#CAE3DE' : 'rgba(165, 55, 251, 0.25)'" 
                    [attr.stroke-width]="activeIndex === 1 ? 2.5 : 1.5"
                    [attr.fill]="activeIndex === 1 ? 'rgba(165, 55, 251, 0.1)' : 'transparent'"
                    class="transition-all duration-300 cursor-pointer"
                    (click)="selectPetal(1)" />

              <!-- Petal 3 (points to 03 at right-bottom / 144 deg) -->
              <path d="M 200 68 C 248 68 280 135 200 200 C 120 135 152 68 200 68 Z" 
                    transform="rotate(144, 200, 200)"
                    [attr.stroke]="activeIndex === 2 ? '#CAE3DE' : 'rgba(165, 55, 251, 0.25)'" 
                    [attr.stroke-width]="activeIndex === 2 ? 2.5 : 1.5"
                    [attr.fill]="activeIndex === 2 ? 'rgba(165, 55, 251, 0.1)' : 'transparent'"
                    class="transition-all duration-300 cursor-pointer"
                    (click)="selectPetal(2)" />

              <!-- Petal 4 (points to 04 at left-bottom / 216 deg) -->
              <path d="M 200 68 C 248 68 280 135 200 200 C 120 135 152 68 200 68 Z" 
                    transform="rotate(216, 200, 200)"
                    [attr.stroke]="activeIndex === 3 ? '#CAE3DE' : 'rgba(165, 55, 251, 0.25)'" 
                    [attr.stroke-width]="activeIndex === 3 ? 2.5 : 1.5"
                    [attr.fill]="activeIndex === 3 ? 'rgba(165, 55, 251, 0.1)' : 'transparent'"
                    class="transition-all duration-300 cursor-pointer"
                    (click)="selectPetal(3)" />

              <!-- Petal 5 (points to 05 at left-top / 288 deg) -->
              <path d="M 200 68 C 248 68 280 135 200 200 C 120 135 152 68 200 68 Z" 
                    transform="rotate(288, 200, 200)"
                    [attr.stroke]="activeIndex === 4 ? '#CAE3DE' : 'rgba(165, 55, 251, 0.25)'" 
                    [attr.stroke-width]="activeIndex === 4 ? 2.5 : 1.5"
                    [attr.fill]="activeIndex === 4 ? 'rgba(165, 55, 251, 0.1)' : 'transparent'"
                    class="transition-all duration-300 cursor-pointer"
                    (click)="selectPetal(4)" />
            </g>
          </svg>

          <!-- ── CENTRAL LOGO (Added for user request) ── -->
          <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0">
            <div class="w-14 h-14 rounded-full bg-prometer-mint flex items-center justify-center shadow-[0_0_20px_rgba(202,227,222,0.4)]">
              <div class="w-7 h-7 bg-prometer-neon" style="-webkit-mask-image: url('assets/prometer-eco-logo.webp'); mask-image: url('assets/prometer-eco-logo.webp'); -webkit-mask-size: contain; mask-size: contain; -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat; -webkit-mask-position: center; mask-position: center;"></div>
            </div>
          </div>

          <!-- ── INTERACTIVE NUMBERS PLACED ON TOP AS HTML BUTTONS ── -->
          <div class="absolute inset-0 pointer-events-none z-10">
            @for (val of currentTextValues; track $index) {
              <button
                (mouseenter)="onPetalHover($index)"
                (mouseleave)="onPetalLeave()"
                (click)="selectPetal($index)"
                class="absolute pointer-events-auto flex items-center justify-center w-11 h-11 rounded-full border transition-all duration-300 font-mono text-xs font-bold"
                [class]="activeIndex === $index 
                  ? 'bg-prometer-mint border-prometer-mint text-prometer-neon scale-125 shadow-[0_0_15px_rgba(202,227,222,0.5)]' 
                  : 'bg-prometer-mint/10 border-prometer-mint/50 text-prometer-mint hover:bg-prometer-mint hover:text-prometer-neon hover:scale-110'"
                [style.left]="getNumberPosition($index).x"
                [style.top]="getNumberPosition($index).y"
                [style.transform]="'translate(-50%, -50%)'"
              >
                0{{ $index + 1 }}
              </button>
            }
          </div>

        </div>
      </div>

      <!-- Shared Text Panel (crossfade text card) -->
      <div class="w-full max-w-xl glass-panel p-8 rounded-2xl border border-prometer-mint/10 bg-prometer-dark/30 backdrop-blur-xl min-h-[160px] flex flex-col justify-center text-center transition-all duration-300 z-10">
        <div class="flex flex-col items-center justify-center transition-opacity duration-200"
             [class.opacity-100]="textOpacity === 1"
             [class.opacity-0]="textOpacity === 0">
          <span class="text-prometer-neon text-[10px] font-mono tracking-wider uppercase mb-2 block font-bold">
            {{ isAr ? 'المبدأ الأساسي' : 'Core Principle' }} 0{{ activeIndex + 1 }}
          </span>
          <h3 class="text-lg font-black text-prometer-mint mb-2 leading-tight">
            {{ currentTextValues[activeIndex].title }}
          </h3>
          <p class="text-xs text-prometer-mint/70 leading-relaxed font-light max-w-md">
            {{ currentTextValues[activeIndex].desc }}
          </p>
        </div>
      </div>

    </div>

  </div>
</section>
